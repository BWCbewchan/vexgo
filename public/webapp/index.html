<!DOCTYPE html>

    <head>
        <meta charset="UTF-8" />

            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
        />
        <meta name="theme-color" content="#007078" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="VEX GO" />

        <link rel="manifest" href="./manifest.webmanifest" />
        <link rel="icon" href="./static/img/icons/vexfavicon.ico" type="image/x-icon" />
        <link rel="apple-touch-icon" href="./pwa/icon-192.png" />

        <!-- Lock UI language to English before VEXcode boots -->
        <script>
            (function () {
                try {
                    var origNavigator = window.navigator;
                    var navProxy = new Proxy(origNavigator, {
                        get: function (target, prop) {
                            if (prop === 'language') return 'en';
                            if (prop === 'languages') return ['en', 'en-US'];
                            var val = target[prop];
                            return typeof val === 'function' ? val.bind(target) : val;
                        },
                    });
                    Object.defineProperty(window, 'navigator', {
                        get: function () {
                            return navProxy;
                        },
                        configurable: true,
                    });
                } catch (e) {
                    try {
                        Object.defineProperty(navigator, 'language', {
                            get: function () {
                                return 'en';
                            },
                            configurable: true,
                        });
                        Object.defineProperty(navigator, 'languages', {
                            get: function () {
                                return ['en', 'en-US'];
                            },
                            configurable: true,
                        });
                    } catch (e2) {}
                }
                try {
                    localStorage.setItem('selectedLanguage', 'en');
                    localStorage.setItem('SelectedLanguage', 'en');
                    localStorage.setItem('language', 'en');
                    localStorage.setItem('i18nextLng', 'en');
                    localStorage.setItem('lng', 'en');
                    localStorage.setItem('locale', 'en');
                    localStorage.setItem('expandLogicCategory', 'enabled');
                } catch (e) {}
            })();
        </script>
